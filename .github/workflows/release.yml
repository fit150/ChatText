name: release

on:
  workflow_dispatch:
    inputs:
      match_readonly:
        type: boolean
        default: true
        required: false
      
      download_model:
        type: boolean
        default: false
        required: false

env:
  HF_MODEL_REPO: Qwen3-ASR-1.7B-4bit

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ChatText.swiftpm
        uses: actions/checkout@v4
        with:
          repository: fit150/ChatText.swiftpm
          token: ${{ secrets.CHAT_TEXT_SWIFTPM_REPO_TOKEN }}
          path: ChatText.swiftpm

      - name: Replace Package.swift
        run: cp Package.swift ChatText.swiftpm/Package.swift

      # ========== 新增：下载并解压 Python-Apple-support（iOS） XCFramework ==========
      - name: Download Python-Apple-support iOS XCFramework
        env:
          PYTHON_APPLE_SUPPORT_URL: "https://github.com/beeware/Python-Apple-support/releases/download/3.14-b9/Python-3.14-iOS-support.b9.tar.gz"
        run: |
          set -euxo pipefail

          # 创建临时目录用于解压
          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT

          # 下载（使用 -L 支持重定向，-sS 隐藏进度但显示错误）
          curl -sSL -o "$tmp_dir/Python-iOS-support.tar.gz" "$PYTHON_APPLE_SUPPORT_URL"

          # 解压到临时目录
          tar -xzf "$tmp_dir/Python-iOS-support.tar.gz" -C "$tmp_dir"

          # 将其中的 Python.xcframework 复制到项目根目录
          # 如果根目录已有同名目录，先删除再复制；若想改为“覆盖合并”，可以用 rsync -a
          if [ -d Python.xcframework ]; then
            rm -rf Python.xcframework
          fi
          cp -R "$tmp_dir/Python.xcframework" "Python.xcframework"
      # ========== 新增步骤结束 ==========

      - name: Download base model from Hugging Face into CopyResources/$HF_MODEL_REPO
        if: ${{ inputs.download_model }}
        run: |
          set -euxo pipefail

          rm -rf hf_download_dir
          mkdir -p hf_download_dir

          brew install huggingface-cli

          hf download "mlx-community/$HF_MODEL_REPO" \
            --local-dir hf_download_dir \
            --exclude ".git*" \
            --exclude ".cache/*" \
            --exclude "*.md" \
            --exclude "README*" \
            --exclude "LICENSE*" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.jpeg" \
            --exclude "*.webp"

          MODEL_TARGET_DIR="ChatTextApp/CopyResources/$HF_MODEL_REPO"

          rm -rf "$MODEL_TARGET_DIR"
          mkdir -p "$MODEL_TARGET_DIR"

          cp -R hf_download_dir/* "$MODEL_TARGET_DIR"/

          echo "model dir files:"
          find "$MODEL_TARGET_DIR" -maxdepth 3 | sort

#      - name: Install XcodeGen
#        run: brew install xcodegen

#      - name: Generate Xcode project
#        run: xcodegen generate

      - name: Install Tuist
        run: brew tap tuist/tuist

      - name: Generate Xcode project
        run: tuist generate



      - name: Install fastlane
        run: sudo gem install fastlane -N

      - name: Build and Upload
        shell: bash
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          TEAM_ID: ${{ vars.TEAM_ID }}

          ASC_KEY_ID: ${{ vars.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ vars.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}

          CERT_REPO_TOKEN: ${{ secrets.CERT_REPO_TOKEN }}

          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_HIDE_CHANGELOG: "1"
        run: |
          set -o pipefail
          fastlane ios release match_readonly:${{ inputs.match_readonly }}
