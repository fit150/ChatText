name: ChatText

settings:
  base:
    APP_BUNDLE_ID: app.fit150.ChatText

packages:
  ChatTextApp:
    path: ChatText.swiftpm

targets:
  ChatText:
    type: application
    platform: iOS

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 0.1
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        
        INFOPLIST_KEY_NSMicrophoneUsageDescription: need mic

        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # ======= 【新增 - 官方文档步骤 6：Build Settings】 =======
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_TESTABILITY: YES
        
        # 【注意修改路径】：如果 Python.xcframework 在项目根目录，保持 $(PROJECT_DIR)。
        # 如果你把它放在了类似 Frameworks/ 的子目录，请改成 $(PROJECT_DIR)/Frameworks
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)
        
        HEADER_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)/Python.framework/Headers"
        CLANG_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO
        # ========================================================

      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 89XHWPF6B6

        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: 89XHWPF6B6
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore app.fit150.ChatText"

    sources:
      - ChatText

    # ======= 【依赖：必须开启 embed & sign】 =======
    dependencies:
      - package: ChatTextApp
        product: ChatTextApp
      - framework: Python.xcframework
        embed: true      # 必须为 true，让 Xcode 把 Python 主二进制拷进去并签名
        codeSign: false
    # ==========================================================

    # ======= 【关键脚本：必须在 postBuildScripts 执行！】 =======
    # postBuildScripts 会在 Xcode 的 "Embed Frameworks" 和 "签名" 完成之后执行
    postBuildScripts:
      - name: "[Python] Handle"
        script: |
          set -e
          
          source "$PROJECT_DIR/Python.xcframework/build/utils.sh"
          install_python Python.xcframework app
          
        basedOnDependencyAnalysis: false



