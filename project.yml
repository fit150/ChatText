name: ChatText

settings:
  base:
    APP_BUNDLE_ID: app.fit150.ChatText

packages:
  ChatTextApp:
    path: ChatText.swiftpm

targets:
  ChatText:
    type: application
    platform: iOS

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 0.1
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        
        INFOPLIST_KEY_NSMicrophoneUsageDescription: need mic

        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # ======= 【新增 - 官方文档步骤 6：Build Settings】 =======
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_TESTABILITY: YES
        
        # 【注意修改路径】：如果 Python.xcframework 在项目根目录，保持 $(PROJECT_DIR)。
        # 如果你把它放在了类似 Frameworks/ 的子目录，请改成 $(PROJECT_DIR)/Frameworks
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(PROJECT_DIR)
        
        HEADER_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)/Python.framework/Headers"
        CLANG_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO
        # ========================================================

      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 89XHWPF6B6

        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: 89XHWPF6B6
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore app.fit150.ChatText"

    sources:
      - ChatText

    # ======= 【依赖：必须开启 embed & sign】 =======
    dependencies:
      - package: ChatTextApp
        product: ChatTextApp
      - framework: Python.xcframework
        embed: false      # 必须为 true，让 Xcode 把 Python 主二进制拷进去并签名
        codeSign: false
    # ==========================================================

    # ======= 【关键脚本：必须在 postBuildScripts 执行！】 =======
    # postBuildScripts 会在 Xcode 的 "Embed Frameworks" 和 "签名" 完成之后执行
    postBuildScripts:
      - name: "[Python] Manual Embed, Patch & Re-Sign"
        script: |
          set -e
          
          source "$PROJECT_DIR/Python.xcframework/build/utils.sh"
          
          # 🌟 1. 手动把 Python.framework 拷进 App 包
          # 因为关闭了 embed:false，Xcode 只把 xcframework 解压到了 BUILT_PRODUCTS_DIR，我们需要自己拷贝
          echo "Manually copying Python.framework to App bundle..."
          cp -Rf "${BUILT_PRODUCTS_DIR}/Python.framework" "${CODESIGNING_FOLDER_PATH}/Frameworks/"
          
          PYTHON_XCFRAMEWORK_PATH="$PROJECT_DIR/Python.xcframework"
          PYTHON_FRAMEWORK_PATH="${CODESIGNING_FOLDER_PATH}/Frameworks/Python.framework"
          
          # 2. 拷贝标准库 .py 文件到 .app/python/lib/
          install_stdlib $PYTHON_XCFRAMEWORK_PATH
          
          PYTHON_VER=$(ls -1 "$CODESIGNING_FOLDER_PATH/python/lib")
          echo "Install Python $PYTHON_VER standard library extension modules..."
          
          # 3. 处理外部的 .so (生成独立的 .framework 并留 .fwork)
          process_dylibs $PYTHON_XCFRAMEWORK_PATH "python/lib/$PYTHON_VER/lib-dynload"
          
          # 🌟 4. 处理 Python.framework 内部的 .so
          # 此时 Xcode 还没对它签名，我们可以随意“动刀子”！
          if [ -d "$PYTHON_FRAMEWORK_PATH/lib/$PYTHON_VER/lib-dynload" ]; then
            echo "Patching embedded Python.framework to remove raw .so files..."
            process_dylibs $PYTHON_XCFRAMEWORK_PATH "Frameworks/Python.framework/lib/$PYTHON_VER/lib-dynload"
          fi
          
          # 5. 处理你自己的 Python 代码目录
          for package_path in app app_packages; do
            if [ -d "$CODESIGNING_FOLDER_PATH/$package_path" ]; then
              echo "Installing $package_path extension modules ..."
              process_dylibs $PYTHON_XCFRAMEWORK_PATH $package_path
            fi
          done
          
          # 🌟🌟🌟 6. 神级关键步骤：手动对修改后的结构进行签名！
          # 必须先签被 .fwork 引用的子 framework，再签主 Python.framework
          echo "Re-signing patched frameworks..."
          
          # 找到所有被提取出来的独立 framework 并签名
          find "${CODESIGNING_FOLDER_PATH}" -name "*.fwork" | while read fwork_file; do
            framework_dir="$(dirname "$fwork_file")/$(basename "$fwork_file" .fwork).framework"
            if [ -d "$framework_dir" ]; then
              codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "$framework_dir"
            fi
          done
          
          # 最后签名被我们动过内部结构的 Python.framework
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "$PYTHON_FRAMEWORK_PATH"
          
          echo "Python patching and signing completed successfully!"
          
        basedOnDependencyAnalysis: false



